<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giyus - גיוס משאבים חכם</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6C5CE7;
  --primary-light: #A29BFE;
  --accent: #00B894;
  --bg: #F7F7FB;
  --card: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --text-muted: #B2BEC3;
  --border: #EEEEF2;
  --danger: #E17055;
  --user-bg: #6C5CE7;
  --bot-bg: #FFFFFF;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

/* ===== APP SHELL ===== */
.app {
  width: 100%;
  max-width: 600px;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  padding: 16px 20px;
  background: white;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo-mark {
  width: 38px;
  height: 38px;
  background: var(--primary);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: white;
}

.header-info { flex: 1; }

.header-name {
  font-size: 16px;
  font-weight: 700;
}

.header-status {
  font-size: 12px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 4px;
}

.header-status::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.header-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
}

/* ===== CHAT AREA ===== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 140px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Message bubbles */
.msg {
  display: flex;
  gap: 10px;
  max-width: 92%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 4px;
}

.msg.bot .msg-avatar {
  background: var(--primary);
  color: white;
  font-weight: 800;
}

.msg.user .msg-avatar {
  background: #DDD;
  font-size: 14px;
}

.msg-bubble {
  border-radius: 18px;
  padding: 14px 18px;
  font-size: 15px;
  line-height: 1.7;
}

.msg.bot .msg-bubble {
  background: white;
  border: 1px solid var(--border);
  border-top-right-radius: 6px;
}

.msg.user .msg-bubble {
  background: var(--primary);
  color: white;
  border-top-left-radius: 6px;
}

/* Rich content inside bot messages */
.msg-bubble h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}

.msg-bubble p {
  margin-bottom: 8px;
}

.msg-bubble p:last-child { margin-bottom: 0; }

/* Opportunity cards inside chat */
.opp-card-chat {
  background: var(--bg);
  border-radius: 14px;
  padding: 14px 16px;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
}

.opp-card-chat:hover {
  border-color: var(--primary-light);
  background: rgba(108,92,231,0.04);
}

.opp-card-chat:active {
  transform: scale(0.98);
}

.opp-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.opp-source-sm {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
}

.opp-match-sm {
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
}

.match-h { background: #E8F8F5; color: #00B894; }
.match-m { background: #FEF9E7; color: #F39C12; }

.opp-title-sm {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.4;
}

.opp-meta-row {
  display: flex;
  gap: 12px;
  font-size: 13px;
}

.opp-amount-sm {
  font-weight: 700;
}

.opp-dl-sm {
  color: var(--text-light);
}

.opp-dl-sm.urgent { color: var(--danger); font-weight: 600; }

/* Draft section inside chat */
.draft-section {
  background: rgba(108,92,231,0.04);
  border: 1px solid rgba(108,92,231,0.12);
  border-radius: 12px;
  padding: 14px 16px;
  margin: 8px 0;
}

.draft-section .draft-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.draft-section .draft-text {
  font-size: 14px;
  line-height: 1.7;
}

/* Checklist inside chat */
.chat-checklist {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: 8px 0;
}

.chat-check {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  padding: 6px 0;
}

.check-dot {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}

.check-dot.ok { background: #E8F8F5; color: var(--accent); }
.check-dot.miss { background: #FEF3CD; color: #F39C12; }

/* Quick action chips (suggestions) */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.suggest-chip {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: white;
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.suggest-chip:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(108,92,231,0.04);
}

.suggest-chip:active {
  background: var(--primary);
  color: white;
}

/* Progress bar in chat */
.chat-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
}

.chat-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.chat-progress-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
}

.chat-progress-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}

/* Typing indicator */
.typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 0;
}

.typing-dot {
  width: 8px;
  height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ===== INPUT AREA ===== */
.input-area {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  padding: 12px 16px 16px;
  background: white;
  border-top: 1px solid var(--border);
  z-index: 60;
}

.input-suggestions {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  -webkit-overflow-scrolling: touch;
}

.input-suggestions::-webkit-scrollbar { display: none; }

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-box {
  flex: 1;
  background: var(--bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color 0.2s;
}

.input-box:focus-within {
  border-color: var(--primary-light);
}

.input-box input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  outline: none;
  color: var(--text);
}

.input-box input::placeholder {
  color: var(--text-muted);
}

.attach-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text-muted);
  padding: 0;
  transition: color 0.2s;
}

.attach-btn:hover { color: var(--primary); }

.send-btn {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: var(--primary);
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.send-btn:hover {
  background: #5A4BD1;
  box-shadow: 0 4px 16px rgba(108,92,231,0.3);
}

/* ===== DEMO CONTROLS ===== */
.demo-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #2D3436;
  color: white;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  z-index: 200;
  font-size: 13px;
}

.demo-bar button {
  padding: 4px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: white;
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.demo-bar button:hover { background: rgba(255,255,255,0.15); }
.demo-bar button.active { background: var(--primary); border-color: var(--primary); }

.header { margin-top: 36px; }

/* File attachment in chat */
.file-attach {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(108,92,231,0.06);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  margin: 4px 0;
}

.file-attach .fa-icon {
  font-size: 14px;
}

/* Export button in chat */
.export-btn-chat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  background: var(--primary);
  color: white;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  margin-top: 8px;
  transition: all 0.2s;
}

.export-btn-chat:hover {
  background: #5A4BD1;
}

/* Time stamp */
.time-stamp {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding: 8px 0;
}

@media (min-width: 601px) {
  .app {
    margin: 0 auto;
    box-shadow: 0 0 60px rgba(0,0,0,0.06);
  }
}
</style>
</head>
<body>

<!-- Demo Controls -->
<div class="demo-bar">
  <span>תרחיש:</span>
  <button class="active" onclick="loadScenario('welcome')">פתיחה</button>
  <button onclick="loadScenario('opportunities')">הזדמנויות</button>
  <button onclick="loadScenario('detail')">פרטים</button>
  <button onclick="loadScenario('writing')">כתיבת הגשה</button>
  <button onclick="loadScenario('refine')">שיפור</button>
</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">G</div>
    <div class="header-info">
      <div class="header-name">Giyus</div>
      <div class="header-status">מכיר את הארגון שלך</div>
    </div>
    <button class="header-btn" title="מסמכי הארגון">&#128194;</button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chat">
    <!-- Messages injected by JS -->
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-suggestions" id="input-suggestions">
      <!-- Suggestions injected by JS -->
    </div>
    <div class="input-row">
      <div class="input-box">
        <button class="attach-btn" title="צרף קובץ">&#128206;</button>
        <input type="text" id="chat-input" placeholder="שאלו משהו, או בקשו לכתוב הגשה..." onkeydown="if(event.key==='Enter')sendMessage()">
      </div>
      <button class="send-btn" onclick="sendMessage()">&#8593;</button>
    </div>
  </div>

</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('chat-input');
const suggestionsEl = document.getElementById('input-suggestions');

// ===== SCENARIOS =====
const scenarios = {

  welcome: {
    messages: [
      {
        type: 'bot',
        html: `
          <h3>&#128075; היי לירון!</h3>
          <p>אני Giyus, העוזר האישי שלך לגיוס משאבים.</p>
          <p>אני כבר מכיר את עמותת הופה — קראתי את הדוחות, התקנון, ונתוני האימפקט שלכם.</p>
          <p>מה תרצי לעשות?</p>
        `,
        suggestions: ['מה חדש בשבילי?', 'כתוב לי הגשה', 'חפש קרנות לנוער בסיכון', 'מה הסטטוס של ההגשות שלי?']
      }
    ]
  },

  opportunities: {
    messages: [
      {
        type: 'user',
        html: 'מה חדש בשבילי?'
      },
      {
        type: 'bot',
        html: `
          <p>מצאתי <strong>3 הזדמנויות חדשות</strong> שמתאימות להופה:</p>

          <div class="opp-card-chat" onclick="loadScenario('detail')">
            <div class="opp-top-row">
              <span class="opp-source-sm">קרן רש"י</span>
              <span class="opp-match-sm match-h">92%</span>
            </div>
            <div class="opp-title-sm">מענקים לתוכניות מניעת נשירה בפריפריה</div>
            <div class="opp-meta-row">
              <span class="opp-amount-sm">&#8362;150,000</span>
              <span class="opp-dl-sm urgent">5 ימים נותרו</span>
            </div>
          </div>

          <div class="opp-card-chat">
            <div class="opp-top-row">
              <span class="opp-source-sm">משרד הרווחה</span>
              <span class="opp-match-sm match-h">87%</span>
            </div>
            <div class="opp-title-sm">ליווי צעירים בוגרי מסגרות חוץ ביתיות</div>
            <div class="opp-meta-row">
              <span class="opp-amount-sm">&#8362;280,000</span>
              <span class="opp-dl-sm">18 יום</span>
            </div>
          </div>

          <div class="opp-card-chat">
            <div class="opp-top-row">
              <span class="opp-source-sm">European Youth Foundation</span>
              <span class="opp-match-sm match-h">85%</span>
            </div>
            <div class="opp-title-sm">Youth Empowerment & Social Inclusion</div>
            <div class="opp-meta-row">
              <span class="opp-amount-sm">&euro;50,000</span>
              <span class="opp-dl-sm">34 יום</span>
            </div>
          </div>

          <p>הכי דחוף: <strong>קרן רש"י</strong> — 5 ימים. רוצה שאכתוב לך הגשה?</p>
        `,
        suggestions: ['כן, תכתוב הגשה לרש"י', 'ספר לי עוד על רש"י', 'מה עם משרד הרווחה?', 'חפש עוד הזדמנויות']
      }
    ]
  },

  detail: {
    messages: [
      {
        type: 'user',
        html: 'ספר לי עוד על רש"י'
      },
      {
        type: 'bot',
        html: `
          <h3>קרן רש"י — מניעת נשירה 2026</h3>
          <p>קול קורא לעמותות שפועלות במניעת נשירת בני נוער בפריפריה. דגש על חדשנות טכנולוגית ומדידת אימפקט.</p>

          <p><strong>למה 92% התאמה?</strong></p>
          <div class="chat-checklist">
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> מניעת נשירה = ליבת הפעילות שלכם</div>
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> פועלים בפריפריה</div>
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> רדאר 360 = חדשנות טכנולוגית</div>
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> גודל תקציב מתאים</div>
          </div>

          <p><strong>מה צריך:</strong></p>
          <div class="chat-checklist">
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> תיאור ארגון — <em>יש לי</em></div>
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> ניסיון מוכח — <em>יש לי</em></div>
            <div class="chat-check"><span class="check-dot miss">&#9998;</span> תכנית עבודה — <em>אכתוב</em></div>
            <div class="chat-check"><span class="check-dot miss">&#9998;</span> תקציב — <em>אכתוב</em></div>
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> אישור ניהול תקין — <em>מצורף</em></div>
            <div class="chat-check"><span class="check-dot ok">&#10003;</span> דוח כספי — <em>מצורף</em></div>
          </div>

          <p>4 מתוך 6 דברים כבר מוכנים. אני צריך לכתוב רק תכנית עבודה ותקציב. תגידי "כתוב" ואני מתחיל.</p>
        `,
        suggestions: ['כתוב לי הגשה', 'כמה זמן ייקח?', 'תראה לי את ה-PDF של הקול קורא']
      }
    ]
  },

  writing: {
    messages: [
      {
        type: 'user',
        html: 'כתוב לי הגשה'
      },
      {
        type: 'bot',
        html: `
          <p>כותב... &#9997;</p>

          <div class="chat-progress">
            <div class="chat-progress-bar"><div class="chat-progress-fill" style="width:100%"></div></div>
            <span class="chat-progress-text">6/6 סעיפים</span>
          </div>

          <div class="draft-section">
            <div class="draft-label">&#10024; 1. תיאור הארגון</div>
            <div class="draft-text">עמותת הופה (ע.ר. 580718847) פועלת מאז 2023 בליווי בני נוער וצעירים בגילאי 14-26 בסיכון לנשירה. הארגון מפעיל מודל "רדאר 360" המשלב זיהוי מוקדם, התאמה אישית וליווי רציף. בשנת 2025 ליוותה הופה 1,200+ צעירים ב-15 יישובים.</div>
          </div>

          <div class="draft-section">
            <div class="draft-label">&#10024; 2. ניסיון מוכח</div>
            <div class="draft-text">בשלוש שנות פעילות: 2,400+ צעירים, שיעור הצלחה 87% במניעת נשירה, 15 יישובים כולל ירושלים, באר שבע וקריית שמונה. שביעות רצון משתתפים 94%.</div>
          </div>

          <div class="draft-section">
            <div class="draft-label">&#10024; 3. תכנית עבודה</div>
            <div class="draft-text">12 חודשים בשלושה שלבים: מיפוי וזיהוי (חודשים 1-3), התערבות אינטנסיבית (4-9), ייצוב וגמילה (10-12). יעד: 200 צעירים נוספים בשני יישובי פריפריה חדשים.</div>
          </div>

// ===== RENDER =====
function loadScenario(name) {
  chatEl.innerHTML = '';

  // Update demo buttons
  document.querySelectorAll('.demo-bar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  // Build all previous messages for context
  const order = ['welcome', 'opportunities', 'detail', 'writing', 'refine'];
  const upTo = order.indexOf(name);

  let allMessages = [];
  for (let i = 0; i <= upTo; i++) {
    if (i > 0) {
      // Add time stamp between scenarios
      allMessages.push({ type: 'time' });
    }
    allMessages = allMessages.concat(scenarios[order[i]].messages);
  }

  // Render
  let lastSuggestions = [];
  allMessages.forEach((msg, idx) => {
    if (msg.type === 'time') {
      return; // skip timestamps for cleaner look
    }

    const div = document.createElement('div');
    div.className = `msg ${msg.type}`;

    const avatar = msg.type === 'bot' ? '<div class="msg-avatar">G</div>' : '<div class="msg-avatar">&#128100;</div>';
    const bubble = `<div class="msg-bubble">${msg.html}</div>`;

    div.innerHTML = avatar + bubble;
    chatEl.appendChild(div);

    if (msg.suggestions) {
      lastSuggestions = msg.suggestions;
    }
  });

  // Render suggestions
  renderSuggestions(lastSuggestions);

  // Scroll to bottom
  setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 100);
}

function renderSuggestions(suggestions) {
  suggestionsEl.innerHTML = '';
  suggestions.forEach(text => {
    const chip = document.createElement('button');
    chip.className = 'suggest-chip';
    chip.textContent = text;
    chip.onclick = () => {
      inputEl.value = text;
      sendMessage();
    };
    suggestionsEl.appendChild(chip);
  });
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  // Add user message
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">&#128100;</div><div class="msg-bubble">${text}</div>`;
  chatEl.appendChild(div);
  inputEl.value = '';

  // Add typing indicator
  const typing = document.createElement('div');
  typing.className = 'msg bot';
  typing.innerHTML = `<div class="msg-avatar">G</div><div class="msg-bubble"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  chatEl.appendChild(typing);

  chatEl.scrollTop = chatEl.scrollHeight;

  // Simulate response after delay
  setTimeout(() => {
    typing.remove();
    const response = document.createElement('div');
    response.className = 'msg bot';
    response.innerHTML = `<div class="msg-avatar">G</div><div class="msg-bubble"><p>אני עובד על זה... (בגרסה האמיתית כאן תהיה תשובה חכמה מה-AI)</p></div>`;
    chatEl.appendChild(response);
    chatEl.scrollTop = chatEl.scrollHeight;
  }, 1500);

  // Clear suggestions
  suggestionsEl.innerHTML = '';
}

// Init
loadScenario('welcome');
</script>
