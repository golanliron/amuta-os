<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giyus - AI Resource Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #12121A;
  --surface-2: #1A1A25;
  --surface-3: #22222F;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #F0F0F5;
  --text-secondary: #8888A0;
  --text-muted: #55556A;
  --accent: #7C6CFF;
  --accent-glow: rgba(124,108,255,0.15);
  --accent-soft: rgba(124,108,255,0.08);
  --green: #34D399;
  --green-glow: rgba(52,211,153,0.12);
  --amber: #FBBF24;
  --red: #F87171;
  --gradient-1: linear-gradient(135deg, #7C6CFF 0%, #A78BFA 50%, #7C6CFF 100%);
  --gradient-2: linear-gradient(135deg, rgba(124,108,255,0.12) 0%, rgba(52,211,153,0.08) 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== APP ===== */
.app {
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ===== HEADER ===== */
.header {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--gradient-1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 900;
  color: white;
  position: relative;
  overflow: hidden;
}

.logo::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
}

.header-info { flex: 1; }

.header-name {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header-status {
  font-size: 12px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 6px;
}

.pulse-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  position: relative;
}

.pulse-dot::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: var(--green);
  opacity: 0;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(2.5); opacity: 0; }
}

.header-btn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}

.header-btn:hover {
  background: var(--surface-2);
  border-color: var(--border-hover);
  color: var(--text);
}

/* ===== CHAT ===== */
.chat {
  flex: 1;
  padding: 24px 20px 160px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
}

/* Messages */
.msg {
  display: flex;
  gap: 12px;
  max-width: 95%;
  animation: msgIn 0.4s cubic-bezier(0.16,1,0.3,1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 34px;
  height: 34px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  font-size: 14px;
  font-weight: 800;
}

.msg.bot .msg-avatar {
  background: var(--gradient-1);
  color: white;
}

.msg.user .msg-avatar {
  background: var(--surface-3);
  color: var(--text-secondary);
}

.msg-body {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}

.msg-sender {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 0 4px;
}

.msg-bubble {
  border-radius: 16px;
  padding: 16px 20px;
  font-size: 14.5px;
  line-height: 1.75;
  letter-spacing: -0.1px;
}

.msg.bot .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
}

.msg.user .msg-bubble {
  background: var(--accent);
  color: white;
  border-radius: 16px 16px 4px 16px;
}

.msg-bubble strong { font-weight: 700; }

.msg-bubble p { margin-bottom: 10px; }
.msg-bubble p:last-child { margin-bottom: 0; }

/* ===== OPPORTUNITY CARDS IN CHAT ===== */
.opp-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  margin: 8px 0;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  position: relative;
  overflow: hidden;
}

.opp-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient-2);
  opacity: 0;
  transition: opacity 0.3s;
}

.opp-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(124,108,255,0.08);
}

.opp-card:hover::before { opacity: 1; }

.opp-row-1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  position: relative;
}

.opp-source {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.3px;
}

.opp-match {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 8px;
  position: relative;
}

.opp-match.high {
  background: var(--green-glow);
  color: var(--green);
}

.opp-match.mid {
  background: rgba(251,191,36,0.1);
  color: var(--amber);
}

.opp-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 10px;
  position: relative;
}

.opp-row-2 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}

.opp-amount {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.opp-deadline {
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}

.opp-deadline.urgent { color: var(--red); }
.opp-deadline.normal { color: var(--text-secondary); }

/* ===== DRAFT SECTIONS ===== */
.draft-block {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}

.draft-block::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.draft-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.draft-text {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
}

/* ===== CHECKLIST ===== */
.check-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: 8px 0;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--surface-2);
  border-radius: 10px;
  font-size: 13px;
}

.check-icon {
  width: 22px;
  height: 22px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}

.check-icon.ok {
  background: var(--green-glow);
  color: var(--green);
}

.check-icon.pending {
  background: var(--accent-soft);
  color: var(--accent);
}

.check-text { flex: 1; }
.check-note { font-size: 11px; color: var(--text-muted); }

/* ===== PROGRESS ===== */
.progress-bar-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface-2);
  border-radius: 10px;
  margin: 8px 0;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--gradient-1);
  border-radius: 2px;
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}

.progress-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}

/* ===== EXPORT BUTTON ===== */
.export-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--gradient-1);
  color: white;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  margin-top: 10px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.export-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
}

.export-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(124,108,255,0.25);
}

/* ===== SUGGESTIONS ===== */
.suggest-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.suggest-chip {
  padding: 8px 16px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.suggest-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

.suggest-chip:active {
  transform: scale(0.96);
}

/* ===== INPUT ===== */
.input-area {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 680px;
  padding: 16px 20px 20px;
  background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
  z-index: 60;
}

.input-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.input-chips::-webkit-scrollbar { display: none; }

.input-container {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 6px 6px 6px 16px;
  transition: all 0.2s;
}

.input-container:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.input-container input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  padding: 10px 0;
}

.input-container input::placeholder {
  color: var(--text-muted);
}

.attach-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: all 0.2s;
}

.attach-btn:hover {
  color: var(--accent);
  background: var(--accent-soft);
}

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--gradient-1);
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.send-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
}

.send-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(124,108,255,0.3);
}

/* ===== TYPING INDICATOR ===== */
.typing {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 0;
}

.typing span {
  width: 7px;
  height: 7px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typePulse 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typePulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
  30% { opacity: 1; transform: scale(1.1); }
}

/* ===== DEMO BAR ===== */
.demo-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(12px);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  z-index: 200;
  border-bottom: 1px solid var(--border);
}

.demo-bar .demo-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 8px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.demo-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.demo-btn:hover {
  background: var(--surface-2);
  color: var(--text);
}

.demo-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.header { margin-top: 44px; }

/* ===== GLOW EFFECT ON SCROLL ===== */
.chat::before {
  content: '';
  position: fixed;
  top: 100px;
  right: 50%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(124,108,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

/* ===== VERSION TAG ===== */
.version-tag {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--surface-2);
  padding: 3px 8px;
  border-radius: 6px;
  margin-right: 8px;
}

@media (max-width: 600px) {
  .app { max-width: 100%; }
  .input-area { max-width: 100%; }
}
</style>
</head>
<body>

<!-- Demo Bar -->
<div class="demo-bar">
  <span class="demo-label">Flow</span>
  <span class="version-tag">v3.0</span>
  <button class="demo-btn active" onclick="go('welcome')">Start</button>
  <button class="demo-btn" onclick="go('opps')">Scan</button>
  <button class="demo-btn" onclick="go('deep')">Deep</button>
  <button class="demo-btn" onclick="go('write')">Write</button>
  <button class="demo-btn" onclick="go('polish')">Polish</button>
</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">G</div>
    <div class="header-info">
      <div class="header-name">Giyus</div>
      <div class="header-status"><span class="pulse-dot"></span> AI Resource Intelligence</div>
    </div>
    <button class="header-btn" title="Documents">&#9776;</button>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-chips" id="chips"></div>
    <div class="input-container">
      <button class="attach-btn">&#128206;</button>
      <input id="input" type="text" placeholder="...מה תרצי לדעת" onkeydown="if(event.key==='Enter')send()">
      <button class="send-btn" onclick="send()">&#8593;</button>
    </div>
  </div>

</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const chipsEl = document.getElementById('chips');

const flows = {

welcome: [
  { role:'bot', html:`
    <p>&#128075; <strong>היי לירון,</strong></p>
    <p>סרקתי 36 מקורות בלילה. יש 3 דברים חדשים שמתאימים להופה.</p>
    <p>אני כבר מכיר את הדוחות, התקנון ונתוני האימפקט שלכם.</p>
  `, chips:['מה חדש?', 'חפש קרנות לבוגרים', 'סטטוס הגשות', 'כתוב הגשה'] }
],

opps: [
  { role:'user', html:'מה חדש בשבילי?' },
  { role:'bot', html:`
    <p>3 הזדמנויות חדשות, ממוינות לפי התאמה:</p>

    <div class="opp-card" onclick="go('deep')">
      <div class="opp-row-1">
        <span class="opp-source">קרן רש"י</span>
        <span class="opp-match high">92%</span>
      </div>
      <div class="opp-title">מענקים למניעת נשירה בפריפריה</div>
      <div class="opp-row-2">
        <span class="opp-amount">&#8362;150,000</span>
        <span class="opp-deadline urgent">&#9673; 5 ימים</span>
      </div>
    </div>

    <div class="opp-card">
      <div class="opp-row-1">
        <span class="opp-source">משרד הרווחה</span>
        <span class="opp-match high">87%</span>
      </div>
      <div class="opp-title">ליווי צעירים בוגרי מסגרות חוץ ביתיות</div>
      <div class="opp-row-2">
        <span class="opp-amount">&#8362;280,000</span>
        <span class="opp-deadline normal">18 יום</span>
      </div>
    </div>

    <div class="opp-card">
      <div class="opp-row-1">
        <span class="opp-source">European Youth Foundation</span>
        <span class="opp-match high">85%</span>
      </div>
      <div class="opp-title">Youth Empowerment & Social Inclusion</div>
      <div class="opp-row-2">
        <span class="opp-amount">&euro;50,000</span>
        <span class="opp-deadline normal">34 יום</span>
      </div>
    </div>

    <p>הכי דחוף: <strong>קרן רש"י</strong>. 5 ימים לדדליין. רוצה שאצלול?</p>
  `, chips:['ספר לי על רש"י', 'כתוב הגשה לרש"י', 'תראה את משרד הרווחה'] }
],

deep: [
  { role:'user', html:'ספר לי על רש"י' },
  { role:'bot', html:`
    <p><strong>קרן רש"י &mdash; מניעת נשירה 2026</strong></p>
    <p>קול קורא לעמותות שפועלות במניעת נשירת נוער בפריפריה. דגש על חדשנות טכנולוגית ומדידת אימפקט.</p>

    <p><strong>למה 92% התאמה:</strong></p>
    <div class="check-list">
      <div class="check-item"><span class="check-icon ok">&#10003;</span><span class="check-text">מניעת נשירה = ליבת הפעילות שלכם</span></div>
      <div class="check-item"><span class="check-icon ok">&#10003;</span><span class="check-text">פועלים בפריפריה</span></div>
      <div class="check-item"><span class="check-icon ok">&#10003;</span><span class="check-text">רדאר 360 = חדשנות טכנולוגית</span></div>
      <div class="check-item"><span class="check-icon ok">&#10003;</span><span class="check-text">גודל תקציב מתאים</span></div>
    </div>

    <p><strong>מה נדרש להגשה:</strong></p>
    <div class="check-list">
      <div class="check-item"><span class="check-icon ok">&#10003;</span><span class="check-text">תיאור ארגון</span><span class="check-note">יש לי</span></div>

function go(name) {
  chatEl.innerHTML = '';
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');

  const order = ['welcome','opps','deep','write','polish'];
  const idx = order.indexOf(name);
  let allMsgs = [];
  for(let i = 0; i <= idx; i++) {
    allMsgs = allMsgs.concat(flows[order[i]]);
  }

  let lastChips = [];
  allMsgs.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = `msg ${m.role}`;

    const avatar = m.role === 'bot'
      ? '<div class="msg-avatar">G</div>'
      : '<div class="msg-avatar">&#128100;</div>';

    const body = `<div class="msg-body">
      <div class="msg-bubble">${m.html}</div>
    </div>`;

    div.innerHTML = avatar + body;
    div.style.animationDelay = `${i * 0.05}s`;
    chatEl.appendChild(div);

    if(m.chips) lastChips = m.chips;
  });

  // Chips
  chipsEl.innerHTML = '';
  lastChips.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'suggest-chip';
    btn.textContent = text;
    btn.onclick = () => { inputEl.value = text; send(); };
    chipsEl.appendChild(btn);
  });

  setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 150);
}

function send() {
  const text = inputEl.value.trim();
  if(!text) return;

  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">&#128100;</div><div class="msg-body"><div class="msg-bubble">${text}</div></div>`;
  chatEl.appendChild(div);
  inputEl.value = '';
  chipsEl.innerHTML = '';

  const typing = document.createElement('div');
  typing.className = 'msg bot';
  typing.innerHTML = `<div class="msg-avatar">G</div><div class="msg-body"><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  chatEl.appendChild(typing);
  chatEl.scrollTop = chatEl.scrollHeight;

  setTimeout(() => {
    typing.remove();
    const resp = document.createElement('div');
    resp.className = 'msg bot';
    resp.innerHTML = `<div class="msg-avatar">G</div><div class="msg-body"><div class="msg-bubble"><p>עובד על זה... (בגרסה האמיתית, כאן תהיה תשובה חכמה)</p></div></div>`;
    chatEl.appendChild(resp);
    chatEl.scrollTop = chatEl.scrollHeight;
  }, 1500);
}

go('welcome');
</script>
