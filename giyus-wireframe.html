<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פישגולד - גייס המשאבים שלך</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --ink: #18181B;
  --ink-2: #52525B;
  --ink-3: #A1A1AA;
  --line: #E4E4E7;
  --fish: #EE7A30;
  --fish-deep: #D4651E;
  --fish-soft: rgba(238,122,48,0.06);
  --fish-glow: rgba(238,122,48,0.15);
  --yes: #16A34A;
  --yes-soft: rgba(22,163,74,0.07);
  --no: #DC2626;
  --no-soft: rgba(220,38,38,0.06);
  --wait: #CA8A04;
  --r: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 760px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
}

/* ===== TOP BAR ===== */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(250,250,250,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 14px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 1px solid var(--line);
}

.fg-logo {
  width: 48px;
  height: 48px;
  border-radius: 16px;
  background: linear-gradient(135deg, #FFB347 0%, #EE7A30 50%, #D4651E 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(238,122,48,0.25);
  position: relative;
  overflow: hidden;
}

/* Goldfish SVG Logo */
.fg-logo svg {
  width: 32px;
  height: 32px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}

.fg-name { flex: 1; }

.fg-name h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--ink);
}

.fg-name p {
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 400;
}

.fg-dots {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--ink-3);
  transition: all 0.15s;
}

.fg-dots:hover { border-color: var(--fish); color: var(--fish); }

/* ===== CHAT ===== */
.chat {
  padding: 28px 20px 185px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.msg {
  display: flex;
  gap: 12px;
  max-width: 94%;
  animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.av {
  width: 38px;
  height: 38px;
  border-radius: 14px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}

.msg.bot .av {
  background: linear-gradient(135deg, #FFB347, #EE7A30);
  border-radius: 14px;
}

.msg.bot .av svg { width: 20px; height: 20px; }

.msg.user .av {
  background: var(--line);
  color: var(--ink-2);
  font-size: 15px;
  border-radius: 14px;
}

.bubble { flex: 1; min-width: 0; }

.bubble-inner {
  font-size: 15px;
  line-height: 1.8;
  padding: 18px 22px;
  border-radius: var(--r);
}

.msg.bot .bubble-inner {
  background: white;
  border: 1px solid var(--line);
  border-top-right-radius: 4px;
}

.msg.user .bubble-inner {
  background: var(--ink);
  color: white;
  border-top-left-radius: 4px;
}

.bubble-inner strong { font-weight: 600; }
.bubble-inner p { margin-bottom: 10px; }
.bubble-inner p:last-child { margin-bottom: 0; }

/* ===== SIG ===== */
.sig {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
  font-size: 12px;
  color: var(--ink-3);
}

.sig svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ===== OPP CARDS ===== */
.opp {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 20px;
  margin: 10px 0;
  cursor: pointer;
  transition: all 0.2s;
}

.opp:hover {
  border-color: var(--fish);
  box-shadow: 0 8px 30px var(--fish-soft);
  transform: translateY(-1px);
}

.opp-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.opp-from {
  font-size: 11px;
  font-weight: 600;
  color: var(--fish-deep);
  letter-spacing: 0.3px;
}

.opp-pct {
  font-size: 12px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  background: var(--yes-soft);
  color: var(--yes);
}

.opp h3 {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.45;
  margin-bottom: 14px;
}

.opp-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.opp-sum {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.opp-dl { font-size: 12px; font-weight: 600; }
.opp-dl.hot { color: var(--no); }
.opp-dl.warm { color: var(--wait); }
.opp-dl.cool { color: var(--ink-3); }

/* ===== INFO BLOCK ===== */
.info-block {
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px 20px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}

.info-block::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, #FFB347, #EE7A30);
}

.info-block .ib-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
  color: var(--fish);
  margin-bottom: 8px;
}

.info-block .ib-text {
  font-size: 14px;
  line-height: 1.85;
  color: var(--ink-2);
}

.info-block .ib-text strong { color: var(--ink); font-weight: 600; }

/* ===== MEMORY BLOCK ===== */
.mem-block {
  background: white;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 20px;
  margin: 10px 0;
  overflow: hidden;
}

.mem-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}

.mem-head svg { width: 18px; height: 18px; }

.mem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.mem-item {
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
}

.mem-item .label {
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-3);
  letter-spacing: 0.2px;
  margin-bottom: 2px;
}

.mem-item .val {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}

.mem-item .val.accent { color: var(--fish-deep); font-weight: 700; }

.mem-updated {
  margin-top: 10px;
  font-size: 11px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ===== CHECKLIST ===== */
.cl {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin: 10px 0;
}

.cl-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
  font-size: 14px;
}

.cl-dot {
  width: 24px;
  height: 24px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  font-weight: 700;
}

.cl-dot.ok { background: var(--yes-soft); color: var(--yes); }
.cl-dot.ai { background: var(--fish-soft); color: var(--fish); }

.cl-text { flex: 1; font-weight: 500; }
.cl-note { font-size: 12px; color: var(--ink-3); }

/* ===== UPLOAD ZONE ===== */
.up-zone {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 14px 0;
}

.up-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  background: white;
  border: 1.5px dashed var(--line);
  border-radius: 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.2s;
}

.up-chip:hover {
  border-color: var(--fish);
  color: var(--fish);
  background: var(--fish-soft);
  border-style: solid;
}

.up-chip span { font-size: 18px; }

/* ===== PROGRESS ===== */
.prog {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 10px;
  margin: 10px 0;
}

.prog-bar {
  flex: 1;
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFB347, var(--fish));
  border-radius: 2px;
}

.prog-txt {
  font-size: 13px;
  font-weight: 700;
  color: var(--fish);
  white-space: nowrap;
}

/* ===== BUTTONS ===== */
.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: var(--ink);
  color: white;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  margin-top: 10px;
  transition: all 0.2s;
}

.dl-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.12);
}

/* ===== QUICK CHIPS ===== */
.chip {
  padding: 9px 16px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink-2);
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.chip:hover {
  border-color: var(--fish);
  color: var(--fish);
  background: var(--fish-soft);
}

/* ===== INPUT ===== */
.input-wrap {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 760px;
  padding: 10px 20px 22px;
  background: linear-gradient(180deg, rgba(250,250,250,0) 0%, var(--bg) 30%);
  z-index: 60;
}

.input-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: none;
}

.input-chips::-webkit-scrollbar { display: none; }

.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 1.5px solid var(--line);
  border-radius: 16px;
  padding: 5px 6px 5px 18px;
  transition: all 0.2s;
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
}

.input-box:focus-within {
  border-color: var(--fish);
  box-shadow: 0 0 0 3px var(--fish-glow), 0 1px 8px rgba(0,0,0,0.04);
}

.input-box input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'Rubik', sans-serif;
  font-size: 15px;
  color: var(--ink);
  outline: none;
  padding: 10px 0;
}

.input-box input::placeholder { color: var(--ink-3); }

.input-box .att {
  background: none;
  border: none;
  color: var(--ink-3);
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  border-radius: 10px;
  transition: all 0.15s;
}

.input-box .att:hover { color: var(--fish); background: var(--fish-soft); }

.input-box .go {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: var(--ink);
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.input-box .go:hover {
  background: var(--fish);
}

/* ===== TYPING ===== */
.dots { display: flex; gap: 5px; padding: 4px 0; }
.dots span {
  width: 6px; height: 6px;
  background: var(--fish);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,60%,100% { opacity:.3; transform:scale(.85); }
  30% { opacity:1; transform:scale(1.1); }
}

/* ===== DEMO BAR ===== */
.demo {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--ink);
  padding: 7px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 200;
}

.demo span {
  font-size: 9px;
  color: var(--fish);
  margin-left: 8px;
  font-weight: 700;
  letter-spacing: 2px;
}

.demo button {
  padding: 4px 11px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.06);
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-family: 'Rubik', sans-serif;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.demo button:hover { color: white; background: rgba(255,255,255,0.06); }
.demo button.on { background: var(--fish); border-color: var(--fish); color: white; font-weight: 600; }

.top-bar { margin-top: 34px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

@media (max-width:760px) {
  .app, .input-wrap { max-width: 100%; }
  .up-zone { grid-template-columns: 1fr; }
  .mem-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="demo">
  <span>DEMO</span>
  <button class="on" onclick="go('welcome')">פתיחה</button>
  <button onclick="go('upload')">העלאה</button>
  <button onclick="go('memory')">זיכרון</button>
  <button onclick="go('scan')">סריקה</button>
  <button onclick="go('write')">כתיבה</button>
  <button onclick="go('fix')">שיפור</button>
</div>

<div class="app">
  <div class="top-bar">
    <div class="fg-logo">
      <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 40 C8 40 2 28 10 18 L22 32 C30 16 46 10 62 14 C78 18 88 30 88 42 C88 56 76 68 60 68 C48 68 36 62 28 52 L10 62 C2 52 8 40 8 40Z" fill="white" opacity="0.95"/>
        <circle cx="68" cy="36" r="4.5" fill="#B8510D"/>
        <path d="M50 42 Q56 38 62 42 Q56 46 50 42Z" fill="#D4651E" opacity="0.4"/>
      </svg>
    </div>
    <div class="fg-name">
      <h1>פישגולד</h1>
      <p>גייס המשאבים שלך</p>
    </div>
    <div class="fg-dots">&#8943;</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-wrap">
    <div class="input-chips" id="chips"></div>
    <div class="input-box">
      <button class="att">&#128206;</button>
      <input id="input" placeholder="תכתבי לפישגולד..." onkeydown="if(event.key==='Enter')send()">
      <button class="go" onclick="send()">&#8593;</button>
    </div>
  </div>
</div>

<script>
const FISH_AV = `<div class="av"><svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg"><path d="M8 40 C8 40 2 28 10 18 L22 32 C30 16 46 10 62 14 C78 18 88 30 88 42 C88 56 76 68 60 68 C48 68 36 62 28 52 L10 62 C2 52 8 40 8 40Z" fill="white" opacity="0.95"/><circle cx="68" cy="36" r="4.5" fill="#B8510D"/><path d="M50 42 Q56 38 62 42 Q56 46 50 42Z" fill="#D4651E" opacity="0.4"/></svg></div>`;

const MEM_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;

const C = document.getElementById('chat');
const I = document.getElementById('input');
const CH = document.getElementById('chips');

const F = {

welcome: [
  { r:'bot', h:`<p><strong>שלום. אני פישגולד.</strong></p>
<p>לא צ'אטבוט, לא "כלי AI". אני גייס משאבים. עשיתי את זה 20 שנה לפני שהפכתי לדיגיטלי, ואני עושה את זה עכשיו טוב יותר מכל יועץ שתשכרי.</p>
<p>אני קורא קולות קוראים כמו שאנשים קוראים כותרות. אני יודע מה קרנות רוצות לשמוע, ומה גורם להן לזרוק בקשה אחרי שני משפטים.</p>
<p><strong>בואי נתחיל. תעלי לי את כל מה שיש על הארגון.</strong></p>
<div class="up-zone">
<div class="up-chip"><span>&#128196;</span> קבצים (PDF, Word, Excel)</div>
<div class="up-chip"><span>&#127760;</span> לינק לאתר הארגון</div>
<div class="up-chip"><span>&#128194;</span> תיקיית Google Drive</div>
<div class="up-chip"><span>&#128233;</span> הגשות קודמות</div>
</div>
<div class="sig"><svg viewBox="0 0 24 24" fill="none" stroke="#EE7A30" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> כל מסמך שתעלי נשמר אצלי לצמיתות. אני לא שוכח.</div>` }
],

upload: [
  { r:'user', h:'הנה: דוח מילולי 2025, דוח כספי, דוח אימפקט, תקנון, אישור ניהול תקין, ואתר hopa.org.il' },
  { r:'bot', h:`<p>6 מקורות. קורא.</p>
<div class="cl">
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">דוח מילולי 2025</span><span class="cl-note">42 עמ'</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">דוח כספי מבוקר</span><span class="cl-note">נקרא</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">דוח אימפקט</span><span class="cl-note">נקרא</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">תקנון</span><span class="cl-note">נקרא</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">אישור ניהול תקין</span><span class="cl-note">תקף</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">hopa.org.il</span><span class="cl-note">14 דפים</span></div>
</div>
<p>טוב, קראתי הכל. הנה מה שאני יודע:</p>
<div class="info-block">
<div class="ib-label">כרטיס ארגון</div>
<div class="ib-text">
<strong>עמותת הופה</strong> | ע.ר. 580718847<br>
חינוך, נוער בסיכון, מניעת נשירה | גילאי 14-26<br>
מודל "רדאר 360" | 1,200+ צעירים | 15 יישובים<br>
87% מניעת נשירה | מחזור 857K | ניהול תקין תקף
</div>
</div>
<p>שאלה אחת: <strong>באילו אזורים אתם?</strong> ההבדל בין "ארצי" ל"פריפריה" שווה מאות אלפים.</p>`, chips:['פריפריה: צפון, דרום, ירושלים', 'ארצי', 'מרכז'] }
],

memory: [
  { r:'user', h:'מה אתה יודע עלינו?' },
  { r:'bot', h:`<p>הכל. זה מה שיש לי בראש:</p>
<div class="mem-block">
<div class="mem-head">${MEM_ICON} הזיכרון של פישגולד</div>

function go(name) {
  C.innerHTML = '';
  document.querySelectorAll('.demo button').forEach(b => b.classList.remove('on'));
  if(event?.target) event.target.classList.add('on');

  const order = ['welcome','upload','memory','scan','write','fix'];
  const idx = order.indexOf(name);
  let msgs = [];
  for(let i = 0; i <= idx; i++) msgs = msgs.concat(F[order[i]]);

  let lastChips = [];
  msgs.forEach((m,i) => {
    const d = document.createElement('div');
    d.className = `msg ${m.r === 'bot' ? 'bot' : 'user'}`;
    const av = m.r === 'bot' ? FISH_AV : '<div class="av">&#128100;</div>';
    d.innerHTML = `${av}<div class="bubble"><div class="bubble-inner">${m.h}</div></div>`;
    d.style.animationDelay = `${i*0.03}s`;
    C.appendChild(d);
    if(m.chips) lastChips = m.chips;
  });

  CH.innerHTML = '';
  (lastChips||[]).forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = t;
    b.onclick = () => { I.value = t; send(); };
    CH.appendChild(b);
  });

  setTimeout(() => C.scrollTop = C.scrollHeight, 100);
}

function send() {
  const t = I.value.trim();
  if(!t) return;
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="av">&#128100;</div><div class="bubble"><div class="bubble-inner">${t}</div></div>`;
  C.appendChild(d);
  I.value = '';
  CH.innerHTML = '';

  const ty = document.createElement('div');
  ty.className = 'msg bot';
  ty.innerHTML = FISH_AV + '<div class="bubble"><div class="bubble-inner"><div class="dots"><span></span><span></span><span></span></div></div></div>';
  C.appendChild(ty);
  C.scrollTop = C.scrollHeight;

  setTimeout(() => {
    ty.remove();
    const r = document.createElement('div');
    r.className = 'msg bot';
    r.innerHTML = FISH_AV + '<div class="bubble"><div class="bubble-inner"><p>עובד על זה...</p></div></div>';
    C.appendChild(r);
    C.scrollTop = C.scrollHeight;
  }, 1200);
}
