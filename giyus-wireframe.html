<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פישגולד - גייס המשאבים שלך</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F7F4;
  --card: #FFFFFF;
  --ink: #1E1E1E;
  --ink-2: #4A4A4A;
  --ink-3: #8E8E8E;
  --line: #E5E2DC;
  --gold: #C19A3E;
  --gold-deep: #A17F2F;
  --gold-soft: rgba(193,154,62,0.08);
  --gold-glow: rgba(193,154,62,0.18);
  --navy: #1B2838;
  --navy-soft: rgba(27,40,56,0.04);
  --yes: #2D8B55;
  --yes-soft: rgba(45,139,85,0.08);
  --no: #C0392B;
  --no-soft: rgba(192,57,43,0.06);
  --wait: #D4870E;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 760px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
}

/* ===== TOP BAR ===== */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--navy);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.fg-logo {
  width: 46px;
  height: 46px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--navy);
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 0 0 2px rgba(193,154,62,0.3);
}

.fg-name {
  flex: 1;
}

.fg-name h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: #FFFFFF;
}

.fg-name p {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.fg-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  font-weight: 500;
}

.fg-status .dot {
  width: 7px;
  height: 7px;
  background: var(--yes);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(45,139,85,0.5);
}

/* ===== CHAT ===== */
.chat {
  padding: 28px 20px 180px;
  display: flex;
  flex-direction: column;
  gap: 26px;
}

.msg {
  display: flex;
  gap: 14px;
  max-width: 94%;
  animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.av {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 15px;
  margin-top: 2px;
}

.msg.bot .av { background: var(--navy); color: var(--gold); }
.msg.user .av { background: var(--line); color: var(--ink-2); font-size: 16px; }

.bubble { flex: 1; min-width: 0; }

.bubble-inner {
  font-size: 15px;
  line-height: 1.85;
  padding: 20px 24px;
  border-radius: 2px 20px 20px 20px;
}

.msg.bot .bubble-inner {
  background: white;
  border: 1px solid var(--line);
  box-shadow: 0 1px 4px rgba(0,0,0,0.03);
}

.msg.user .bubble-inner {
  background: var(--navy);
  color: white;
  border-radius: 20px 2px 20px 20px;
  box-shadow: 0 2px 8px rgba(27,40,56,0.15);
}

.bubble-inner strong { font-weight: 700; }
.bubble-inner p { margin-bottom: 10px; }
.bubble-inner p:last-child { margin-bottom: 0; }

/* ===== SIGNATURE LINE ===== */
.sig {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 500;
}

.sig .gold { color: var(--gold); font-weight: 700; }

/* ===== OPPORTUNITY CARDS ===== */
.opp {
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px 22px;
  margin: 10px 0;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.opp::before {
  content: '';
  position: absolute;
  top: 12px;
  right: 0;
  width: 3px;
  height: calc(100% - 24px);
  background: var(--gold);
  border-radius: 3px;
  opacity: 0;
  transition: opacity 0.2s;
}

.opp:hover {
  border-color: var(--gold);
  box-shadow: 0 8px 30px var(--gold-soft);
  transform: translateY(-2px);
}

.opp:hover::before { opacity: 1; }

.opp-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.opp-from {
  font-size: 11px;
  font-weight: 700;
  color: var(--gold-deep);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.opp-pct {
  font-size: 12px;
  font-weight: 800;
  padding: 3px 12px;
  border-radius: 20px;
  background: var(--yes-soft);
  color: var(--yes);
}

.opp h3 {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 14px;
  color: var(--ink);
}

.opp-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.opp-sum {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--navy);
}

.opp-dl { font-size: 12px; font-weight: 700; }
.opp-dl.hot { color: var(--no); }
.opp-dl.warm { color: var(--wait); }
.opp-dl.cool { color: var(--ink-3); }

/* ===== INFO BLOCK ===== */
.info-block {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 22px;
  margin: 10px 0;
  border-right: 3px solid var(--gold);
}

.info-block .ib-label {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--gold-deep);
  margin-bottom: 8px;
}

.info-block .ib-text {
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink-2);
}

.info-block .ib-text strong { color: var(--ink); }

/* ===== MEMORY BLOCK ===== */
.mem-block {
  background: var(--navy-soft);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 10px 0;
}

.mem-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--navy);
}

.mem-head .icon { font-size: 16px; }

.mem-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.mem-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 14px;
  background: white;
  border-radius: 8px;
  border: 1px solid var(--line);
}

.mem-item .label {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.mem-item .val {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}

.mem-item .val.gold { color: var(--gold-deep); }

.mem-updated {
  margin-top: 8px;
  font-size: 11px;
  color: var(--ink-3);
  text-align: left;
  direction: ltr;
}

/* ===== CHECKLIST ===== */
.cl {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin: 10px 0;
}

.cl-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
  font-size: 14px;
}

.cl-dot {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  font-weight: 700;
}

.cl-dot.ok { background: var(--yes-soft); color: var(--yes); }
.cl-dot.ai { background: var(--gold-soft); color: var(--gold-deep); }
.cl-dot.up { background: var(--gold-soft); color: var(--gold-deep); }

.cl-text { flex: 1; }
.cl-note { font-size: 12px; color: var(--ink-3); font-weight: 500; }

/* ===== UPLOAD ZONE ===== */
.up-zone {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 14px 0;
}

.up-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  background: white;
  border: 1.5px dashed var(--line);
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.2s;
}

.up-chip:hover {
  border-color: var(--gold);
  color: var(--gold-deep);
  background: var(--gold-soft);
  border-style: solid;
}

.up-chip span { font-size: 18px; }

/* ===== PROGRESS ===== */
.prog {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 10px;
  margin: 10px 0;
}

.prog-bar {
  flex: 1;
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-deep), var(--gold));
  border-radius: 2px;
}

.prog-txt {
  font-size: 13px;
  font-weight: 800;
  color: var(--gold-deep);
  white-space: nowrap;
}

/* ===== BUTTONS ===== */
.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 30px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  margin-top: 10px;
  transition: all 0.2s;
  letter-spacing: 0.2px;
}

.dl-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(27,40,56,0.2);
}

/* ===== QUICK CHIPS ===== */
.chip {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1.5px solid var(--line);
  background: white;
  color: var(--ink-2);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.chip:hover {
  border-color: var(--gold);
  color: var(--gold-deep);
  background: var(--gold-soft);
}

.chip:active { transform: scale(0.96); }

/* ===== INPUT ===== */
.input-wrap {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 760px;
  padding: 12px 20px 22px;
  background: linear-gradient(180deg, rgba(248,247,244,0) 0%, var(--bg) 25%);
  z-index: 60;
}

.input-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: none;
}

.input-chips::-webkit-scrollbar { display: none; }

.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 1.5px solid var(--line);
  border-radius: 14px;
  padding: 6px 8px 6px 18px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.03);
}

.input-box:focus-within {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow), 0 2px 12px rgba(0,0,0,0.03);
}

.input-box input {
  flex: 1;
  border: none;
  background: none;
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  color: var(--ink);
  outline: none;
  padding: 10px 0;
}

.input-box input::placeholder { color: var(--ink-3); }

.input-box .att {
  background: none;
  border: none;
  color: var(--ink-3);
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: all 0.2s;
}

.input-box .att:hover { color: var(--gold); background: var(--gold-soft); }

.input-box .go {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  background: var(--navy);
  border: none;
  color: var(--gold);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.input-box .go:hover {
  background: var(--gold);
  color: var(--navy);
}

/* ===== TYPING ===== */
.dots { display: flex; gap: 5px; padding: 4px 0; }
.dots span {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce {
  0%,60%,100% { opacity:.25; transform:scale(.85); }
  30% { opacity:1; transform:scale(1.15); }
}

/* ===== DEMO BAR ===== */
.demo {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #111;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  z-index: 200;
}

.demo span {
  font-size: 10px;
  color: var(--gold);
  margin-left: 8px;
  font-weight: 700;
  letter-spacing: 1px;
}

.demo button {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  color: rgba(255,255,255,0.4);
  font-family: 'Heebo', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.demo button:hover { color: white; background: rgba(255,255,255,0.06); }
.demo button.on { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: 800; }

.top-bar { margin-top: 36px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

@media (max-width:760px) {
  .app, .input-wrap { max-width: 100%; }
  .up-zone { grid-template-columns: 1fr; }
  .mem-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="demo">
  <span>DEMO</span>
  <button class="on" onclick="go('welcome')">פתיחה</button>
  <button onclick="go('upload')">העלאה</button>
  <button onclick="go('memory')">זיכרון</button>
  <button onclick="go('scan')">סריקה</button>
  <button onclick="go('write')">כתיבה</button>
  <button onclick="go('fix')">שיפור</button>
</div>

<div class="app">
  <div class="top-bar">
    <div class="fg-logo">פ</div>
    <div class="fg-name">
      <h1>פישגולד</h1>
      <p>גייס המשאבים שלך</p>
    </div>
    <div class="fg-status"><span class="dot"></span> פעיל</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-wrap">
    <div class="input-chips" id="chips"></div>
    <div class="input-box">
      <button class="att">&#128206;</button>
      <input id="input" placeholder="תכתבי לפישגולד..." onkeydown="if(event.key==='Enter')send()">
      <button class="go" onclick="send()">&#8593;</button>
    </div>
  </div>
</div>

<script>
const C = document.getElementById('chat');
const I = document.getElementById('input');
const CH = document.getElementById('chips');

const F = {

welcome: [
  { r:'bot', h:`<p><strong>שלום. אני פישגולד.</strong></p>
<p>לא צ'אטבוט, לא עוזר וירטואלי, לא "כלי AI לגיוס". אני גייס משאבים. עשיתי את זה 20 שנה לפני שהפכתי לדיגיטלי, ואני עושה את זה עכשיו טוב יותר מכל יועץ שתשכרי.</p>
<p>אני קורא קולות קוראים כמו שאנשים קוראים כותרות. אני יודע מה קרנות רוצות לשמוע, ומה גורם להן לזרוק בקשה אחרי שני משפטים.</p>
<p><strong>בואי נתחיל. תעלי לי את כל מה שיש על הארגון. ככל שאדע יותר, אכתוב יותר טוב.</strong></p>
<div class="up-zone">
<div class="up-chip"><span>&#128196;</span> קבצים (PDF, Word, Excel)</div>
<div class="up-chip"><span>&#127760;</span> לינק לאתר הארגון</div>
<div class="up-chip"><span>&#128194;</span> תיקיית Google Drive</div>
<div class="up-chip"><span>&#128233;</span> הגשות קודמות</div>
</div>
<div class="sig"><span class="gold">&#9632;</span> אני זוכר הכל. כל מסמך שתעלי נשמר אצלי לצמיתות.</div>` }
],

upload: [
  { r:'user', h:'הנה: דוח מילולי 2025, דוח כספי, דוח אימפקט, תקנון, אישור ניהול תקין, ואתר hopa.org.il' },
  { r:'bot', h:`<p>6 מקורות. קורא.</p>
<div class="cl">
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">דוח מילולי 2025</span><span class="cl-note">42 עמודים</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">דוח כספי מבוקר</span><span class="cl-note">נקרא</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">דוח אימפקט</span><span class="cl-note">נקרא</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">תקנון</span><span class="cl-note">נקרא</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">אישור ניהול תקין</span><span class="cl-note">תקף</span></div>
<div class="cl-item"><span class="cl-dot ok">&#10003;</span><span class="cl-text">hopa.org.il</span><span class="cl-note">14 דפים נסרקו</span></div>
</div>
<p>טוב, קראתי הכל. הנה מה שאני יודע עליכם עכשיו:</p>
<div class="info-block">
<div class="ib-label">כרטיס ארגון - הופה</div>
<div class="ib-text">
<strong>ע.ר. 580718847</strong> | חינוך, נוער בסיכון, מניעת נשירה<br>
גילאי 14-26 | מודל "רדאר 360" | 1,200+ צעירים | 15 יישובים<br>
87% מניעת נשירה | מחזור 857K | ניהול תקין: תקף עד 2027<br>
מנכ"לית: לירון גולן | 8 עובדים + 50 מנטורים
</div>
</div>
<p>שאלה אחת: <strong>באילו אזורים בדיוק אתם פועלים?</strong> אני צריך את זה בשביל התאמת קרנות. הבדל בין "ארצי" ל"פריפריה" שווה מאות אלפי שקלים.</p>`, chips:['פריפריה: צפון, דרום, ירושלים', 'ארצי', 'בעיקר מרכז'] }
],

memory: [
  { r:'user', h:'מה אתה יודע עלינו?' },
  { r:'bot', h:`<p>אני יודע עליכם הכל. זה מה שבראש שלי:</p>
<div class="mem-block">
<div class="mem-head"><span class="icon">&#128451;</span> הזיכרון של פישגולד - עמותת הופה</div>
<div class="mem-grid">
<div class="mem-item"><span class="label">ע.ר.</span><span class="val">580718847</span></div>
<div class="mem-item"><span class="label">תחום</span><span class="val">מניעת נשירה</span></div>
<div class="mem-item"><span class="label">גילאים</span><span class="val">14-26</span></div>

function go(name) {
  C.innerHTML = '';
  document.querySelectorAll('.demo button').forEach(b => b.classList.remove('on'));
  if(event?.target) event.target.classList.add('on');

  const order = ['welcome','upload','memory','scan','write','fix'];
  const idx = order.indexOf(name);
  let msgs = [];
  for(let i = 0; i <= idx; i++) msgs = msgs.concat(F[order[i]]);

  let lastChips = [];
  msgs.forEach((m,i) => {
    const d = document.createElement('div');
    d.className = `msg ${m.r === 'bot' ? 'bot' : 'user'}`;
    const av = m.r === 'bot' ? '<div class="av">\u05E4</div>' : '<div class="av">&#128100;</div>';
    d.innerHTML = `${av}<div class="bubble"><div class="bubble-inner">${m.h}</div></div>`;
    d.style.animationDelay = `${i*0.03}s`;
    C.appendChild(d);
    if(m.chips) lastChips = m.chips;
  });

  CH.innerHTML = '';
  (lastChips||[]).forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = t;
    b.onclick = () => { I.value = t; send(); };
    CH.appendChild(b);
  });

  setTimeout(() => C.scrollTop = C.scrollHeight, 100);
}

function send() {
  const t = I.value.trim();
  if(!t) return;
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="av">&#128100;</div><div class="bubble"><div class="bubble-inner">${t}</div></div>`;
  C.appendChild(d);
  I.value = '';
  CH.innerHTML = '';

  const ty = document.createElement('div');
  ty.className = 'msg bot';
  ty.innerHTML = '<div class="av">\u05E4</div><div class="bubble"><div class="bubble-inner"><div class="dots"><span></span><span></span><span></span></div></div></div>';
  C.appendChild(ty);
  C.scrollTop = C.scrollHeight;

  setTimeout(() => {
    ty.remove();
    const r = document.createElement('div');
    r.className = 'msg bot';
    r.innerHTML = '<div class="av">\u05E4</div><div class="bubble"><div class="bubble-inner"><p>עובד על זה...</p></div></div>';
    C.appendChild(r);
    C.scrollTop = C.scrollHeight;
  }, 1200);
}
