<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פישגולד - גייס המשאבים שלך</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --ink: #18181B;
  --ink-2: #52525B;
  --ink-3: #A1A1AA;
  --line: #E4E4E7;
  --fish: #EE7A30;
  --fish-deep: #D4651E;
  --fish-soft: rgba(238,122,48,0.06);
  --fish-glow: rgba(238,122,48,0.15);
  --yes: #16A34A;
  --yes-soft: rgba(22,163,74,0.07);
  --no: #DC2626;
  --no-soft: rgba(220,38,38,0.06);
  --wait: #CA8A04;
  --r: 14px;
  --sidebar: 370px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}

/* ===== LAYOUT ===== */
.shell {
  display: flex;
  height: 100vh;
  direction: rtl;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar);
  background: white;
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sb-head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sb-logo {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: linear-gradient(135deg, #FFB347 0%, #EE7A30 50%, #D4651E 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 10px rgba(238,122,48,0.25);
  flex-shrink: 0;
}

.sb-logo svg { width: 26px; height: 26px; }

.sb-title h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.sb-title p {
  font-size: 11px;
  color: var(--ink-3);
}

/* Sidebar Tabs */
.sb-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}

.sb-tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-right: none;
  border-left: none;
  font-family: 'Rubik', sans-serif;
}

.sb-tab:hover { color: var(--ink-2); }
.sb-tab.on { color: var(--fish); border-bottom-color: var(--fish); background: white; }

.sb-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* --- Tab 1: Org Profile --- */
.org-card {
  background: var(--bg);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}

.org-card .org-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-3);
  letter-spacing: 0.3px;
  margin-bottom: 3px;
}

.org-card .org-val {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}

.org-card .org-val.accent { color: var(--fish-deep); }

.org-section {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-3);
  letter-spacing: 0.3px;
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}

.org-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.org-docs {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.org-doc {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
}

.org-doc .check { color: var(--yes); font-size: 14px; }

.org-upload-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  margin-top: 12px;
  border: 1.5px dashed var(--line);
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.15s;
  background: none;
  font-family: 'Rubik', sans-serif;
  width: 100%;
}

.org-upload-btn:hover {
  border-color: var(--fish);
  color: var(--fish);
  background: var(--fish-soft);
}

/* --- Tab 2: Opportunities --- */
.opp-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.opp-card {
  background: var(--bg);
  border-radius: var(--r);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.opp-card:hover {
  background: var(--fish-soft);
  box-shadow: 0 2px 12px rgba(238,122,48,0.08);
}

.opp-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.opp-card-from {
  font-size: 10px;
  font-weight: 600;
  color: var(--fish-deep);
  letter-spacing: 0.2px;
}

.opp-card-pct {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 12px;
  background: var(--yes-soft);
  color: var(--yes);
}

.opp-card h4 {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
}

.opp-card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.opp-card-sum {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.opp-card-dl {
  font-size: 11px;
  font-weight: 600;
}

.opp-card-dl.hot { color: var(--no); }
.opp-card-dl.warm { color: var(--wait); }
.opp-card-dl.cool { color: var(--ink-3); }

.opp-card-actions {
  display: flex;
  gap: 6px;
}

.opp-action {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 7px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: white;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Rubik', sans-serif;
}

.opp-action:hover { border-color: var(--fish); color: var(--fish); }
.opp-action .icon { font-size: 14px; }

.opp-send-all {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 11px;
  margin-top: 10px;
  border-radius: 10px;
  background: var(--ink);
  color: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: 'Rubik', sans-serif;
  width: 100%;
  transition: all 0.15s;
}

.opp-send-all:hover { background: var(--fish); }

/* --- Tab 3: Timeline / Gantt --- */
.gantt-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.gantt-month {
  font-size: 15px;
  font-weight: 700;
}

.gantt-nav {
  display: flex;
  gap: 4px;
}

.gantt-nav button {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: white;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rubik', sans-serif;
  transition: all 0.15s;
}

.gantt-nav button:hover { border-color: var(--fish); color: var(--fish); }

.gantt-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 16px;
}

.gantt-day-label {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-3);
  padding: 4px 0;
}

.gantt-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  position: relative;
  cursor: default;
}

.gantt-day.today {
  background: var(--ink);
  color: white;
  font-weight: 700;
  border-radius: 50%;
}

.gantt-day.deadline {
  background: var(--fish-soft);
  color: var(--fish-deep);
  font-weight: 700;
  cursor: pointer;
}

.gantt-day.deadline.urgent {
  background: var(--no-soft);
  color: var(--no);
}

.gantt-day.deadline::after {
  content: '';
  position: absolute;
  bottom: 2px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
}

.gantt-day.past { color: var(--ink-3); opacity: 0.4; }

.gantt-events {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.gantt-event {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: 10px;
}

.gantt-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.gantt-dot.urgent { background: var(--no); }
.gantt-dot.soon { background: var(--fish); }
.gantt-dot.later { background: var(--ink-3); }

.gantt-event-info { flex: 1; }

.gantt-event-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
}

.gantt-event-date {
  font-size: 11px;
  color: var(--ink-3);
}

.gantt-sync {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  margin-top: 14px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: white;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  font-family: 'Rubik', sans-serif;
  width: 100%;
  transition: all 0.15s;
}

.gantt-sync:hover { border-color: var(--fish); color: var(--fish); }
.gantt-sync .g-icon { font-size: 16px; }

/* ===== MAIN CHAT AREA ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

.chat-head {
  padding: 16px 24px;
  border-bottom: 1px solid var(--line);
  background: rgba(250,250,250,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  gap: 10px;
}

.chat-head-av {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: linear-gradient(135deg, #FFB347, #EE7A30);
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-head-av svg { width: 20px; height: 20px; }

.chat-head-info h2 {
  font-size: 15px;
  font-weight: 700;
}

.chat-head-info p {
  font-size: 11px;
  color: var(--yes);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}

.chat-head-info p::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--yes);
  border-radius: 50%;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.msg {
  display: flex;
  gap: 12px;
  max-width: 88%;
  animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.av {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}

.msg.bot .av {
  background: linear-gradient(135deg, #FFB347, #EE7A30);
}

.msg.bot .av svg { width: 18px; height: 18px; }

.msg.user .av {
  background: var(--line);
  color: var(--ink-2);
  font-size: 14px;
}

.bubble { flex: 1; min-width: 0; }

.bubble-inner {
  font-size: 14.5px;
  line-height: 1.8;
  padding: 16px 20px;
  border-radius: var(--r);
}

.msg.bot .bubble-inner {
  background: white;
  border: 1px solid var(--line);
  border-top-right-radius: 4px;
}

.msg.user .bubble-inner {
  background: var(--ink);
  color: white;
  border-top-left-radius: 4px;
}

.bubble-inner strong { font-weight: 600; }
.bubble-inner p { margin-bottom: 8px; }
.bubble-inner p:last-child { margin-bottom: 0; }

/* Info blocks in chat */
.info-block {
  background: var(--bg);
  border-radius: 10px;
  padding: 14px 16px;
  margin: 8px 0;
  position: relative;
  overflow: hidden;
}

.info-block::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, #FFB347, #EE7A30);
}

.info-block .ib-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  color: var(--fish);
  margin-bottom: 6px;
}

.info-block .ib-text {
  font-size: 13px;
  line-height: 1.85;
  color: var(--ink-2);
}

.info-block .ib-text strong { color: var(--ink); font-weight: 600; }

/* Checklist in chat */
.cl { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
.cl-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg);
  border-radius: 8px; font-size: 13px;
}
.cl-dot {
  width: 22px; height: 22px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0; font-weight: 700;
}
.cl-dot.ok { background: var(--yes-soft); color: var(--yes); }
.cl-dot.ai { background: var(--fish-soft); color: var(--fish); }
.cl-text { flex: 1; font-weight: 500; }
.cl-note { font-size: 11px; color: var(--ink-3); }

/* Progress */
.prog {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg);
  border-radius: 8px; margin: 8px 0;
}
.prog-bar { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #FFB347, var(--fish)); border-radius: 2px; }
.prog-txt { font-size: 12px; font-weight: 700; color: var(--fish); }

/* Download button */
.dl-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 24px; background: var(--ink); color: white;
  border-radius: 10px; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; font-family: 'Rubik', sans-serif;
  margin-top: 8px; transition: all 0.15s;
}
.dl-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

/* ===== INPUT AREA ===== */
.input-wrap {
  padding: 12px 20px 18px;
  border-top: 1px solid var(--line);
  background: white;
}

.input-chips {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}

.input-chips::-webkit-scrollbar { display: none; }

.chip {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--ink-2);
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.chip:hover { border-color: var(--fish); color: var(--fish); background: var(--fish-soft); }

.input-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1.5px solid var(--line);
  border-radius: 14px;
  padding: 4px 6px 4px 16px;
  transition: all 0.2s;
}

.input-box:focus-within {
  border-color: var(--fish);
  box-shadow: 0 0 0 3px var(--fish-glow);
  background: white;
}

.input-box input {
  flex: 1; border: none; background: none;
  font-family: 'Rubik', sans-serif; font-size: 14px;
  color: var(--ink); outline: none; padding: 8px 0;
}

.input-box input::placeholder { color: var(--ink-3); }

.input-box .att {
  background: none; border: none; color: var(--ink-3);
  font-size: 18px; cursor: pointer; padding: 6px;
  border-radius: 8px; transition: all 0.15s;
}

.input-box .att:hover { color: var(--fish); }

.input-box .go {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--ink); border: none; color: white;
  font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}

.input-box .go:hover { background: var(--fish); }

/* ===== TYPING ===== */
.dots { display: flex; gap: 4px; padding: 4px 0; }
.dots span { width: 5px; height: 5px; background: var(--fish); border-radius: 50%; animation: bounce 1.4s infinite; }
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100% { opacity:.3; transform:scale(.85); } 30% { opacity:1; transform:scale(1.1); } }

/* ===== DEMO BAR ===== */
.demo {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--ink); padding: 6px 12px;
  display: flex; align-items: center; justify-content: center;
  gap: 4px; z-index: 200;
}
.demo span { font-size: 9px; color: var(--fish); margin-left: 8px; font-weight: 700; letter-spacing: 2px; }
.demo button {
  padding: 4px 10px; border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.06); background: transparent;
  color: rgba(255,255,255,0.35); font-family: 'Rubik', sans-serif;
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.demo button:hover { color: white; background: rgba(255,255,255,0.06); }
.demo button.on { background: var(--fish); border-color: var(--fish); color: white; font-weight: 600; }

.shell { margin-top: 32px; height: calc(100vh - 32px); }

/* ===== MOBILE ===== */
.sb-toggle {
  display: none;
  position: fixed;
  bottom: 90px;
  left: 16px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--fish);
  color: white;
  border: none;
  font-size: 20px;
  cursor: pointer;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(238,122,48,0.3);
  align-items: center;
  justify-content: center;
  font-family: 'Rubik', sans-serif;
}

@media (max-width: 900px) {
  .sidebar {
    position: fixed;
    top: 32px;
    right: 0;
    bottom: 0;
    width: 100%;
    max-width: 400px;
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  }
  .sidebar.open { transform: translateX(0); }
  .sb-toggle { display: flex; }
  .main { width: 100%; }
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
</style>
</head>
<body>

<div class="demo">
  <span>DEMO</span>
  <button class="on" onclick="go('welcome')">פתיחה</button>
  <button onclick="go('upload')">העלאה</button>
  <button onclick="go('scan')">סריקה</button>
  <button onclick="go('write')">כתיבה</button>
  <button onclick="go('fix')">שיפור</button>
</div>

<button class="sb-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>

<div class="shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 40 Q18 22 40 16 Q55 12 68 18 Q82 26 84 42 Q84 58 68 64 Q52 70 38 62 L18 72 Q12 58 18 40Z" fill="white" opacity="0.95"/>
          <path d="M14 40 Q8 30 14 20 L22 34Z" fill="white" opacity="0.8"/>
          <circle cx="65" cy="34" r="4" fill="#B8510D"/>
          <path d="M48 44 Q56 40 64 44" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
        </svg>
      </div>
      <div class="sb-title">
        <h1>פישגולד</h1>
        <p>גייס המשאבים שלך</p>
      </div>
    </div>

    <div class="sb-tabs">
      <button class="sb-tab on" onclick="switchTab('org')">העמותה</button>

function go(name) {
  C.innerHTML = '';
  document.querySelectorAll('.demo button').forEach(b => b.classList.remove('on'));
  if(event?.target) event.target.classList.add('on');

  const order = ['welcome','upload','scan','write','fix'];
  const idx = order.indexOf(name);
  let msgs = [];
  for(let i = 0; i <= idx; i++) msgs = msgs.concat(F[order[i]]);

  // Update sidebar based on scenario
  if(idx >= 1) {
    switchTabSilent('org');
    document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.sb-tab')[0].classList.add('on');
  }
  if(idx >= 2) {
    switchTabSilent('opps');
    document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.sb-tab')[1].classList.add('on');
  }

  let lastChips = [];
  msgs.forEach((m,i) => {
    const d = document.createElement('div');
    d.className = `msg ${m.r === 'bot' ? 'bot' : 'user'}`;
    const av = m.r === 'bot' ? FISH_AV : '<div class="av">&#128100;</div>';
    d.innerHTML = `${av}<div class="bubble"><div class="bubble-inner">${m.h}</div></div>`;
    d.style.animationDelay = `${i*0.03}s`;
    C.appendChild(d);
    if(m.chips) lastChips = m.chips;
  });

  CH.innerHTML = '';
  (lastChips||[]).forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = t;
    b.onclick = () => { I.value = t; send(); };
    CH.appendChild(b);
  });

  setTimeout(() => C.scrollTop = C.scrollHeight, 100);
}

function switchTabSilent(name) {
  SB.innerHTML = tabData[name];
}

function send() {
  const t = I.value.trim();
  if(!t) return;
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="av">&#128100;</div><div class="bubble"><div class="bubble-inner">${t}</div></div>`;
  C.appendChild(d);
  I.value = '';
  CH.innerHTML = '';

  const ty = document.createElement('div');
  ty.className = 'msg bot';
  ty.innerHTML = FISH_AV + '<div class="bubble"><div class="bubble-inner"><div class="dots"><span></span><span></span><span></span></div></div></div>';
  C.appendChild(ty);
  C.scrollTop = C.scrollHeight;

  setTimeout(() => {
    ty.remove();
    const r = document.createElement('div');
    r.className = 'msg bot';
    r.innerHTML = FISH_AV + '<div class="bubble"><div class="bubble-inner"><p>עובד על זה...</p></div></div>';
    C.appendChild(r);
    C.scrollTop = C.scrollHeight;
  }, 1200);
}

// Init
switchTab.call(null, 'org');
document.querySelectorAll('.sb-tab')[0].classList.add('on');
SB.innerHTML = tabData.org;
go('welcome');
</script>
